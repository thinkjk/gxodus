services:
  gxodus:
    build: .
    volumes:
      - ./config:/config
      - ./exports:/exports
    ports:
      - "6080:6080"  # noVNC (only needed for 'auth')
    environment:
      - GXODUS_CONFIG_DIR=/config
      - GXODUS_OUTPUT_DIR=/exports
      # Uncomment to use an external browserless instance:
      # - GXODUS_REMOTE_CHROME=ws://browserless:3000
    command: export

  # Optional: external browserless container
  # browserless:
  #   image: browserless/chrome
  #   ports:
  #     - "3000:3000"
